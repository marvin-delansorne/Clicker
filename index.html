<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&family=Montserrat:ital,wght@0,401;1,401&display=swap" rel="stylesheet">
       <script src="./controller/js/index.js" defer></script>
        <script src="./controller/js/achievements.js" defer></script> 
        <script src="controller/js/mysteryBox.js" defer></script>

 
    <title>Dofus Clicker</title>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <div class="center-panel">
                <button class="spin-wheel-btn" onclick="openWheelModal()"><img src="./public/assets/buttonwheel.png" alt="Roulette"width="250px"height="250px"></button>
            </div>
            <div id="wheel-modal" class="modal">
                <div class="modal-content">
                    <span class="close-btn" onclick="closeWheelModal()">&times;</span>
                <div class="wheel-container">
                        <div class="dofus-wheel">
                            <img src="./public/assets/dofusemeraude.png" alt="Dofus Emeraude" class="dofus-item">
                            <img src="./public/assets/dofusocre.png" alt="Dofus Ocre" class="dofus-item">
                            <img src="./public/assets/dofuspourpre.png" alt="Dofus Pourpre" class="dofus-item">
                            <img src="./public/assets/dofusivoire.png" alt="Dofus Ivoire" class="dofus-item">
                            <img src="./public/assets/dofusebene.png" alt="Dofus Ebène" class="dofus-item">
                            <img src="./public/assets/dofusturquoise.png" alt="Dofus Turquoise" class="dofus-item">
                        </div>
                    </div>
                    <button class="spin-btn" onclick="spinWheel()">Lancer la roue</button>
                </div>
            </div>
        
            <div class="character">
                <img src="./public/assets/character.png"alt="character">
            </div>
        </div>

        <div class="center-panel">
            <div class="header">
                <div class="kamas-counter">
                    <p>Kamas <br /><span class="kamas-cost red-text"></span></p>
                </div>
            </div>
            
            <div class="main-coin">
                <div class="kama-img-container">
                    <img src="public/assets/kamas.png" alt="Clicker Kama" class="kamas-img" onclick="incrementKamas(event)" draggable="false">
                    <div id="particle-container"></div>
                </div>
            </div>
            
            <div class="minions-container">
                <div class="minion-row">
                    <div class="minion"><img src="../assets/minion1.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion2.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion3.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion4.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion5.png" alt="Minion"></div>
                </div>
                <div class="minion-row">
                    <div class="minion"><img src="../assets/minion1.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion2.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion3.png" alt="Minion"></div>
                    <div class="minion"><img src="../assets/minion4.png" alt="Minion"></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <h3>Boutique</h3>
            
            <div class="shop-item" onclick="buyUpgrade('clicker')">
                <img src="public/assets/click.webp" alt="Clicker" class="shop-icon">
                <div class="shop-info">
                    <h4>Clicker</h4>
                    <p class="cost-text"><span class="clicker-cost"></span> <img src="public/assets/Kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="clicker-level">0</span>
                    <div class="level-tooltip">
                        +<span class="clicker-increase"></span> kamas par click
                    </div>
                </div>
            </div>

            <div class="shop-item" onclick="buyUpgrade('snouffle')">
                <img src="public/assets/Snouffle.webp" alt="Snouffle" class="shop-icon">
                <div class="shop-info">
                    <h4>Snouffle</h4>
                    <p class="cost-text"><span class="snouffle-cost"></span> <img src="public/assets/kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="snouffle-level">0</span>
                    <div class="level-tooltip">
                        +<span class="snouffle-increase"></span> kamas par secondes
                    </div>
                </div>
            </div>

            <div class="shop-item" onclick="buyUpgrade('moumoune')">
                <img src="public/assets/Nomoon.webp" alt="Moumoune" class="shop-icon">
                <div class="shop-info">
                    <h4>Momoon</h4>
                    <p class="cost-text"><span class="moumoune-cost"></span> <img src="public/assets/kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="moumoune-level">0</span>
                    <div class="level-tooltip">
                        +<span class="moumoune-increase"></span> kamas par secondes
                    </div>
                </div>
            </div>

            <div class="shop-item" onclick="buyUpgrade('phortiche')">
                <img src="public/assets/phortiche.webp" alt="Phortiche" class="shop-icon">
                <div class="shop-info">
                    <h4>Phortiche</h4>
                    <p class="cost-text"><span class="phortiche-cost"></span> <img src="public/assets/kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="phortiche-level">0</span>
                    <div class="level-tooltip">
                        +<span class="phortiche-increase"></span> kamas par secondes
                    </div>
                </div>
            </div>
        </div>

        <div class="statistics">
            <div class="stats-content">
                <p>KPC: <span id="kpc-text" class="red-text">1</span></p>
                <p>KPS: <span id="kps-text" class="red-text">0</span></p>
            </div>
        </div>
    </div>

    <script src="controller/js/index.js"></script>
</body>
</html>
