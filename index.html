<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Clicker/public/css/root.css">
    <link rel="stylesheet" href="public/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&family=Montserrat:ital,wght@0,401;1,401&display=swap" rel="stylesheet">
    <script src="./controller/js/index.js" defer></script>
    <script src="./controller/js/achievements.js" defer></script> 
    <script src="./controller/js/changeSkin.js" defer></script>
    <script src="controller/js/mysteryBox.js" defer></script>
    <script src="./controller/js/toggleMusic.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Dofus Clicker</title>
    <script src="controller/js/char.js"></script>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <h3>Roue de la fortune</h3>
            <button class="spin-wheel-btn" onclick="openWheelModal()">
                <img src="./public/assets/buttonwheel.png" alt="Roulette" width="250px" height="250px">
            </button>
            
            <div id="wheel-modal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close" onclick="closeWheelModal()">&times;</span>
                    <div class="wheel-container">
                        <div class="selection-bar"></div>
                        <div class="center-marker"></div>
                        <div class="dofus-wheel"></div>
                    </div>
                    <button class="spin-btn" onclick="spinWheel()"></button>
                </div>
            </div>
        
            <div class="character">
                <img src="./public/assets/character.png" alt="character">
            </div>
            <div class="reset-container" style="display: none;">
                <button id="reset-button" onclick="resetGame()">Reset la partie</button>
            </div>
        </div>

        <div class="center-panel">
            <div class="header">
                <div class="music-toggle">
                    <img id="music-icon" src="./public/assets/music-on.png" alt="Music Toggle" onclick="toggleMusic()" draggable="false">
                </div>
               
                <div class="kamas-counter">
                    <p>Kamas <br /><span class="kamas-cost red-text"></span></p>
                </div>
            </div>
            
            <div class="main-coin">
                <div class="kama-img-container">
                    <img src="public/assets/kamas.png" alt="Clicker Kama" class="kamas-img" onclick="incrementKamas(event)" draggable="false">
                    <div id="particle-container"></div>
                </div>
            </div>
            
            <div id="charContainer" class="chars-container">
                <!-- Les personnages seront ajoutés dynamiquement -->
            </div>
        </div>

        <div class="right-panel">
            <h3>Boutique</h3>
            
            <div class="shop-item" onclick="buyUpgrade('clicker')">
                <img src="public/assets/click.webp" alt="Clicker" class="shop-icon">
                <div class="shop-info">
                    <h4>Clicker</h4>
                    <p class="cost-text"><span class="clicker-cost"></span> <img src="public/assets/Kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="clicker-level">0</span>
                    <div class="level-tooltip">
                        +<span class="clicker-increase"></span> kamas par click
                    </div>
                </div>
            </div>

            <div class="shop-item" onclick="buyUpgrade('snouffle')">
                <img src="public/assets/Snouffle.webp" alt="Snouffle" class="shop-icon">
                <div class="shop-info">
                    <h4>Snouffle</h4>
                    <p class="cost-text"><span class="snouffle-cost"></span> <img src="public/assets/kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="snouffle-level">0</span>
                    <div class="level-tooltip">
                        +<span class="snouffle-increase"></span> kamas par secondes
                    </div>
                </div>
            </div>

            <div class="shop-item" onclick="buyUpgrade('moumoune')">
                <img src="public/assets/Nomoon.webp" alt="Moumoune" class="shop-icon">
                <div class="shop-info">
                    <h4>Momoon</h4>
                    <p class="cost-text"><span class="moumoune-cost"></span> <img src="public/assets/kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="moumoune-level">0</span>
                    <div class="level-tooltip">
                        +<span class="moumoune-increase"></span> kamas par secondes
                    </div>
                </div>
            </div>

            <div class="shop-item" onclick="buyUpgrade('phortiche')">
                <img src="public/assets/phortiche.webp" alt="Phortiche" class="shop-icon">
                <div class="shop-info">
                    <h4>Phortiche</h4>
                    <p class="cost-text"><span class="phortiche-cost"></span> <img src="public/assets/kamas.png" class="mini-kama"></p>
                </div>
                <div class="shop-level">
                    Level <span class="phortiche-level">0</span>
                    <div class="level-tooltip">
                        +<span class="phortiche-increase"></span> kamas par secondes
                    </div>
                </div>
            </div>
        </div>

        <div class="statistics">
            <div class="stats-content">
                <p>KPC: <span id="kpc-text" class="red-text">1</span></p>
                <p>KPS: <span id="kps-text" class="red-text">0</span></p>
            </div>
        </div>
    </div>

    <div id="achievements-container"></div>
    <div id="toast-container"></div>
    <audio id="background-music" loop>
        <source src="./public/assets/sound/Dofus Fan OST I - Ballade en Amakna.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
